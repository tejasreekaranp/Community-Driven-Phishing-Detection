<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      width: 300px;
      background: #0f0f13;
      color: #e8e8f0;
      padding: 16px;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 14px;
    }

    .header-icon { font-size: 20px; }

    .header h1 {
      font-size: 14px;
      font-weight: 700;
      color: #a78bfa;
      letter-spacing: 0.5px;
    }

    .card {
      background: #1a1a24;
      border-radius: 12px;
      padding: 14px;
      border: 1px solid #2e2e3e;
    }

    .url-text {
      font-size: 11px;
      color: #888;
      word-break: break-all;
      margin-bottom: 12px;
      line-height: 1.4;
      border-bottom: 1px solid #2e2e3e;
      padding-bottom: 10px;
    }

    .score-ring {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin: 12px 0;
    }

    .score-number {
      font-size: 42px;
      font-weight: 800;
      line-height: 1;
    }

    .score-label {
      font-size: 11px;
      color: #666;
      margin-top: 2px;
    }

    .status-badge {
      display: inline-block;
      padding: 5px 16px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 700;
      margin-top: 10px;
      letter-spacing: 0.5px;
    }

    .safe .score-number { color: #4ade80; }
    .safe .status-badge { background: rgba(74,222,128,0.15); color: #4ade80; border: 1px solid #4ade8040; }

    .suspicious .score-number { color: #fb923c; }
    .suspicious .status-badge { background: rgba(251,146,60,0.15); color: #fb923c; border: 1px solid #fb923c40; }

    .phishing .score-number { color: #f87171; }
    .phishing .status-badge { background: rgba(248,113,113,0.15); color: #f87171; border: 1px solid #f8717140; }
    .verified .score-number { color: #4ade80; font-size: 24px; letter-spacing: 0.8px; }
    .verified .status-badge { background: rgba(74,222,128,0.15); color: #4ade80; border: 1px solid #4ade8040; }

    .details {
      display: flex;
      gap: 8px;
      margin-top: 12px;
      flex-wrap: wrap;
    }

    .detail-item {
      flex: 1 1 130px;
      background: #0f0f13;
      border-radius: 8px;
      padding: 8px;
      text-align: center;
    }

    .detail-value {
      font-size: 13px;
      font-weight: 700;
      color: #c4b5fd;
    }

    .detail-key {
      font-size: 10px;
      color: #555;
      margin-top: 2px;
    }

    .loading {
      text-align: center;
      padding: 24px 0;
      color: #555;
      font-size: 13px;
    }

    .spinner {
      width: 28px;
      height: 28px;
      border: 3px solid #2e2e3e;
      border-top-color: #a78bfa;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto 10px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .error {
      text-align: center;
      color: #f87171;
      font-size: 12px;
      padding: 16px 0;
    }

    .tip {
      font-size: 10px;
      color: #444;
      text-align: center;
      margin-top: 12px;
    }
    .report-btn {
      background: #f44336;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 6px 14px;
      cursor: pointer;
      font-size: 13px;
      margin-top: 10px;
      width: 100%;
    }

    .report-btn:hover {
      background: #d32f2f;
    }

    .report-section {
      text-align: center;
      margin-top: 10px;
    }

    
  </style>
</head>
<body>
  <div class="header">
    <span class="header-icon">🛡️</span>
    <h1>PHISHING DETECTOR</h1>
  </div>

  <div class="card" id="card">
    <div class="loading" id="loading">
      <div class="spinner"></div>
      Checking community status...
    </div>

    <div id="result" style="display:none;">
      <div class="url-text" id="url-text"></div>

      <div class="score-ring" id="score-section">
        <div class="score-number" id="score-num">—</div>
        <div class="score-label" id="score-label">Community Reports</div>
        <div class="status-badge" id="status-badge"></div>
      </div>

      <div class="details" id="details"></div>
    </div>
    <div class="report-section" id="report-section" style="display:none;">
        <button id="report-btn" class="report-btn">👎 Quick Report to Community</button>
        <div id="report-msg" style="display:none; color:#4CAF50; font-size:12px; margin-top:6px;">
          Reported! Thank you for keeping the community safe.
        </div>
      </div>
    </div>
    <div id="error-box" style="display:none;" class="error">
      Backend not reachable.<br/>Make sure the Flask server is running on port 5000.
    </div>
  </div>

  <p class="tip">Community-based reporting and verified business tracking</p>

  <script src="popup.js"></script>
</body>
</html>
